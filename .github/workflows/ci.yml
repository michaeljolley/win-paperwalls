name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: |
          dotnet restore src/WinPaperWalls/WinPaperWalls.csproj -r win-x64
          dotnet restore tests/WinPaperWalls.Tests/WinPaperWalls.Tests.csproj -r win-x64

      - name: Build
        run: |
          dotnet build src/WinPaperWalls/WinPaperWalls.csproj -r win-x64 --no-restore
          dotnet build tests/WinPaperWalls.Tests/WinPaperWalls.Tests.csproj -r win-x64 --no-restore

      - name: Test
        run: dotnet test tests/WinPaperWalls.Tests/WinPaperWalls.Tests.csproj -r win-x64 --no-build

      - name: Verify AOT publish (x64)
        if: github.event_name == 'push'
        run: >
          dotnet publish src/WinPaperWalls/WinPaperWalls.csproj -c Release -r win-x64
          /p:AppxPackageSigningEnabled=false
